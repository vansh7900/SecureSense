apiVersion: v1
kind: ConfigMap
metadata:
  name: securesense-config
  namespace: securesense
  labels:
    app: securesense
data:
  # Environment Configuration
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  LOG_FILE_PATH: "/var/log/securesense/auth.log"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  
  # Backend Configuration
  BACKEND_HOST: "0.0.0.0"
  BACKEND_PORT: "8000"
  BACKEND_WORKERS: "4"
  
  # Frontend Configuration
  FRONTEND_HOST: "0.0.0.0"
  FRONTEND_PORT: "80"
  API_BASE_URL: "http://securesense-backend:8000"
  
  # Redis Configuration
  REDIS_HOST: "securesense-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_CACHE_TTL: "3600"
  
  # Application Settings
  METRICS_ENABLED: "true"
  THREAT_DETECTION_THRESHOLD: "6"
  
  # Security Settings
  CORS_ORIGINS: "http://localhost:3000,https://localhost,https://*.securesense.local"
  ALLOWED_HOSTS: "localhost,127.0.0.1,securesense.local,*.securesense.local"
  
  # JWT Configuration
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  
  # Feature Flags
  ENABLE_ML_DETECTION: "true"
  ENABLE_THREAT_BLOCKING: "true"
  ENABLE_LOG_PARSING: "true"
  ENABLE_AI_ASSISTANT: "true"
