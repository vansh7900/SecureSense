apiVersion: v1
kind: Namespace
metadata:
  name: securesense
  labels:
    name: securesense
    environment: production
    monitoring: "true"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: securesense-limits
  namespace: securesense
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    type: Container

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: securesense-quota
  namespace: securesense
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "20Gi"
    limits.cpu: "20"
    limits.memory: "40Gi"
    pods: "50"
    services: "10"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: securesense-backend
  namespace: securesense

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: securesense-frontend
  namespace: securesense
