apiVersion: v1
kind: Service
metadata:
  name: securesense-backend
  namespace: securesense
  labels:
    app: securesense-backend
spec:
  type: ClusterIP
  selector:
    app: securesense-backend
    tier: backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: securesense-frontend
  namespace: securesense
  labels:
    app: securesense-frontend
spec:
  type: ClusterIP
  selector:
    app: securesense-frontend
    tier: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  sessionAffinity: None

---
# LoadBalancer Service for external access (Change to ClusterIP if using Ingress)
apiVersion: v1
kind: Service
metadata:
  name: securesense-frontend-lb
  namespace: securesense
  labels:
    app: securesense-frontend
spec:
  type: LoadBalancer
  selector:
    app: securesense-frontend
    tier: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
    nodePort: 30080
  sessionAffinity: None

---
# Service for Redis (if using separate Redis deployment)
apiVersion: v1
kind: Service
metadata:
  name: securesense-redis
  namespace: securesense
  labels:
    app: securesense-redis
spec:
  type: ClusterIP
  selector:
    app: securesense-redis
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
