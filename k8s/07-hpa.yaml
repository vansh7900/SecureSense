# Horizontal Pod Autoscaler for Backend
# Requires: metrics-server to be installed on the cluster
# Install with: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: securesense-backend-hpa
  namespace: securesense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: securesense-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max

---
# Horizontal Pod Autoscaler for Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: securesense-frontend-hpa
  namespace: securesense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: securesense-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      selectPolicy: Max

---
# PodDisruptionBudget for Backend (ensures minimum replicas during disruptions)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: securesense-backend-pdb
  namespace: securesense
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: securesense-backend
      tier: backend

---
# PodDisruptionBudget for Frontend
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: securesense-frontend-pdb
  namespace: securesense
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: securesense-frontend
      tier: frontend
